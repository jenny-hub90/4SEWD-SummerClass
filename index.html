<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Form</title>
  </head>
  <body>
    <h1>User Registration</h1>
    <form>
      <h2>Personal Details</h2>
      <div class="form-group">
        <label>First Name:</label>
        <input type="text" />
      </div>
      <div class="form-group">
        <label>Last Name:</label>
        <input type="text" />
      </div>
      <div class="form-group">
        <label>Age:</label>
        <input type="number" />
      </div>
      <div class="form-group">
        <label>Gender:</label>
        <select>
          <option selected>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Profile Picture:</label>
        <button>Browse</button><span> No files selected</span>
      </div>
      <h2>Account Details</h2>
      <div class="form-group">
        <label>Email</label>
        <input type="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" />
      </div>
      <div class="form-group">
        <label>Role:</label>
        <div class="radio-group">
          <label>Admin</label>
          <input type="radio" />
          <label>User</label>
          <input type="radio" />
        </div>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" /><label>
          I agree to the terms and conditions</label
        >
      </div>
      <div class="btn-group">
        <button>Register</button>
        <button>Reset</button>
      </div>
    </form>
    <footer>© 2026 My Todo List. All rights reserved.</footer>
  </body>
</html>
