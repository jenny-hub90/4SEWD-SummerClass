<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Winky+Rough:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <title>Registration</title>
  </head>
  <body>
    <h1>User Registration</h1>

    <form>
      <h2>Personal Details</h2>
      <div class="form-group">
        <label>First Name:</label>
        <input type="text" />
      </div>
      <div class="form-group">
        <label>Last Name:</label>
        <input type="text" />
      </div>
      <div class="form-group">
        <label>Age:</label>
        <input type="number" />
      </div>
      <div class="form-group">
        <label>Gender:</label>
        <select>
          <option selected>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>
      <div class="btn-group">
        <label>Profile Picture:</label>
        <button>Browse...</button>
        <p>No files selected.</p>
      </div>
      <h2>Account Details</h2>
      <div class="form-group">
        <label>Email:</label>
        <input type="email" />
      </div>
      <div class="form-group">
        <label>Password:</label>
        <input type="password" />
      </div>
      <div class="radio-group">
        <label>Role:</label>
        <label>Admin</label>
        <input type="radio" />
        <label>User</label>
        <input type="radio" />
      </div>
      <div class="checkbox-group">
        <input type="checkbox" />
        <p>I agree with the terms and conditions</p>
      </div>
      <div class="btn-group">
        <button>Register</button>
        <button>Reset</button>
      </div>
    </form>

    <footer>© 2026 My TodoList. All rights reserved.</footer>
  </body>
</html>
